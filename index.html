<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BakeryBeats - MVP</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🥖 BakeryBeats</h1>
            <p class="tagline">Creëer je eigen bakkerij-ritmes</p>
        </header>

        <main>
            <section class="beat-maker">
                <h2>Beat Maker</h2>
                <div class="controls">
                    <button id="playBtn" class="btn primary">▶️ Play</button>
                    <button id="stopBtn" class="btn">⏹️ Stop</button>
                    <button id="clearBtn" class="btn">🗑️ Clear</button>
                    <div class="tempo-control">
                        <label for="tempo">Tempo: <span id="tempoValue">120</span> BPM</label>
                        <input type="range" id="tempo" min="60" max="180" value="120">
                    </div>
                </div>

                <div class="sequencer">
                    <div class="instrument-labels">
                        <div class="instrument-label">🥣 Mixer</div>
                        <div class="instrument-label">🍪 Cookie Cutter</div>
                        <div class="instrument-label">🔥 Oven</div>
                        <div class="instrument-label">🛒 Cash Register</div>
                        <div class="instrument-label">🔔 Bell</div>
                    </div>
                    <div class="steps-grid" id="stepsGrid">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>
            </section>

            <section class="sounds-preview">
                <h2>Geluiden</h2>
                <div class="sound-buttons">
                    <button class="sound-btn" data-sound="mixer">🥣 Mixer</button>
                    <button class="sound-btn" data-sound="cutter">🍪 Cookie Cutter</button>
                    <button class="sound-btn" data-sound="oven">🔥 Oven</button>
                    <button class="sound-btn" data-sound="register">🛒 Cash Register</button>
                    <button class="sound-btn" data-sound="bell">🔔 Bell</button>
                </div>
            </section>
        </main>

        <footer>
            <p>BakeryBeats MVP - Een eenvoudige beat maker met bakkerij-geluiden</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
