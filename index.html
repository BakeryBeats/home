<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bakery Beats - BPM Detector</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 400px;
    background: #151515;
    border-radius: 22px;
    padding: 40px 32px;
    text-align: center;
    border: 1px solid rgba(255, 170, 71, 0.25);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 {
    margin: 0;
    font-size: 28px;
    color: #ffb347;
}

.sub {
    margin-top: 10px;
    font-size: 14px;
    color: #9a9a9a;
}

/* 🔥 spacing fix */
.section {
    margin-top: 30px;
}

input { display: none; }

.dropzone {
    border: 2px dashed rgba(255, 179, 71, 0.4);
    border-radius: 18px;
    padding: 45px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: rgba(255,255,255,0.02);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.dropzone:hover {
    background: rgba(255, 179, 71, 0.08);
    border-color: #ffb347;
    box-shadow: 0 0 20px rgba(255, 179, 71, 0.25);
    transform: translateY(-2px);
}

.dropzone.active {
    background: rgba(255, 179, 71, 0.15);
    border-color: #ffb347;
}
    
.filetext {
    margin-top: 10px;
    font-size: 13px;
    color: #bdbdbd;
}

button {
    width: 100%;
    margin-top: 25px;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: #ffb347;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s ease;
}

button:hover {
    background: #ff9f1a;
    transform: translateY(-1px);
}

button:disabled {
    background: #444;
    cursor: not-allowed;
}

.loading {
    margin-top: 18px;
    font-size: 13px;
    color: #aaa;
}

/* 🔥 NETTE PROGRESS BAR */
.progress-container {
    width: 100%;
    height: 6px;
    background: #2a2a2a;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
    display: none;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffb347, #ff9f1a);
    transition: width 0.3s ease;
}

.result {
    margin-top: 25px;
    font-size: 36px;
    font-weight: bold;
    color: #ffb347;
}
</style>
</head>

<body>

<div class="card">
    <h1>Bakery Beats</h1>
    <div class="sub">Upload your beat → detect BPM 🎧</div>

    <div class="section">
      <label class="dropzone" id="dropzone">
    <div style="font-size:16px; font-weight:500;">
        Drop your audio here
    </div>

    <div class="filetext" id="filename" style="margin-top:12px;">
        MP3 / WAV supported
    </div>

    <input type="file" id="fileInput">
</label>
    </div>

    <button id="btn" onclick="upload()">Analyze BPM</button>

    <div class="loading" id="loading"></div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="result" id="result"></div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const dropzone = document.getElementById("dropzone");
const filename = document.getElementById("filename");
const btn = document.getElementById("btn");

fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) {
        filename.innerText = "Selected: " + fileInput.files[0].name;
    }
});

dropzone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropzone.classList.add("active");
});

dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("active");
});

dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("active");

    fileInput.files = e.dataTransfer.files;

    if (fileInput.files[0]) {
        filename.innerText = "Selected: " + fileInput.files[0].name;
    }
});

async function upload() {
    let file = fileInput.files[0];

    if (!file) {
        alert("Upload a file first");
        return;
    }

    const loading = document.getElementById("loading");
    const result = document.getElementById("result");
    const bar = document.getElementById("progressBar");
    const container = document.getElementById("progressContainer");

    btn.disabled = true;
    loading.innerText = "Analyzing...";
    result.innerText = "";

    container.style.display = "block";
    bar.style.width = "0%";

    let progress = 0;
    let interval = setInterval(() => {
        if (progress < 90) {
            progress += Math.random() * 6;
            bar.style.width = progress + "%";
        }
    }, 300);

    let formData = new FormData();
    formData.append("file", file);

    try {
        let response = await fetch("https://home-70iz.onrender.com/upload/", {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        clearInterval(interval);
        bar.style.width = "100%";

        loading.innerText = "";

        if (data.bpm) {
            result.innerText = data.bpm + " BPM";
        } else {
            result.innerText = "Error";
        }

    } catch (err) {
        clearInterval(interval);
        loading.innerText = "";
        result.innerText = "Server error";
    }

    setTimeout(() => {
        container.style.display = "none";
        bar.style.width = "0%";
    }, 800);

    btn.disabled = false;
}
</script>

</body>
</html>
