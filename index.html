<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bakery Beats - BPM Detector</title>

<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        width: 380px;
        background: #151515;
        border-radius: 22px;
        padding: 32px;
        text-align: center;
        border: 1px solid rgba(255, 170, 71, 0.25);
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    h1 {
        margin: 0;
        font-size: 26px;
        color: #ffb347;
    }

    .sub {
        margin-top: 6px;
        font-size: 13px;
        color: #9a9a9a;
    }

    .spacer { height: 22px; }

    input { display: none; }

    .dropzone {
        border: 2px dashed rgba(255, 179, 71, 0.6);
        border-radius: 16px;
        padding: 28px;
        cursor: pointer;
        transition: 0.25s ease;
    }

    .dropzone:hover {
        background: rgba(255, 179, 71, 0.08);
    }

    .dropzone.active {
        background: rgba(255, 179, 71, 0.15);
    }

    button {
        width: 100%;
        margin-top: 18px;
        padding: 13px;
        border: none;
        border-radius: 14px;
        background: #ffb347;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #ff9f1a;
    }

    button:disabled {
        background: #444;
        cursor: not-allowed;
    }

    .loading {
        margin-top: 14px;
        font-size: 13px;
        color: #aaa;
        min-height: 18px;
    }

    .result {
        margin-top: 18px;
        font-size: 34px;
        font-weight: bold;
        color: #ffb347;
        min-height: 40px;
    }

    /* 🔥 MODERNE LOADER */
    .progress-container {
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.08);
        border-radius: 20px;
        overflow: hidden;
        margin-top: 14px;
        display: none;
    }

    .progress-bar {
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, #ffb347, #ff9f1a);
        border-radius: 20px;
        animation: loadingMove 1.2s infinite ease-in-out;
    }

    @keyframes loadingMove {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(100%); }
        100% { transform: translateX(100%); }
    }
</style>
</head>

<body>

<div class="card">
    <h1>Bakery Beats</h1>
    <div class="sub">Upload your beat → detect BPM 🎧</div>

    <div class="spacer"></div>

    <label class="dropzone" id="dropzone">
        <div>Drop your audio here</div>
        <div id="filename">MP3 / WAV supported</div>
        <input type="file" id="fileInput">
    </label>

    <button id="btn" onclick="upload()">Analyze BPM</button>

    <div class="loading" id="loading"></div>

    <!-- loader -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar"></div>
    </div>

    <div class="result" id="result"></div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const dropzone = document.getElementById("dropzone");
const filename = document.getElementById("filename");
const btn = document.getElementById("btn");

fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) {
        filename.innerText = "Selected: " + fileInput.files[0].name;
    }
});

dropzone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropzone.classList.add("active");
});

dropzone.addEventListener("dragleave", () => {
    dropzone.classList.remove("active");
});

dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("active");

    fileInput.files = e.dataTransfer.files;

    if (fileInput.files[0]) {
        filename.innerText = "Selected: " + fileInput.files[0].name;
    }
});

async function upload() {
    let file = fileInput.files[0];

    if (!file) {
        alert("Upload a file first");
        return;
    }

    const loading = document.getElementById("loading");
    const result = document.getElementById("result");
    const container = document.getElementById("progressContainer");

    btn.disabled = true;
    loading.innerText = "Analyzing audio...";
    result.innerText = "";

    container.style.display = "block";

    let formData = new FormData();
    formData.append("file", file);

    try {
        // 🔥 zorgt dat loader meteen zichtbaar is
        await new Promise(r => setTimeout(r, 50));

        let response = await fetch("/upload/", {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        loading.innerText = "";

        if (data.bpm) {
            result.innerText = data.bpm + " BPM";
        } else {
            result.innerText = "Error";
        }

    } catch (err) {
        loading.innerText = "";
        result.innerText = "Server error";
    }

    container.style.display = "none";
    btn.disabled = false;
}
</script>

</body>
</html>
